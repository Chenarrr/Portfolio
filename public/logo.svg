<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111116"/>
      <stop offset="100%" stop-color="#0A0A0D"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4B55E"/>
      <stop offset="100%" stop-color="#9A7A32"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="24" fill="url(#bg)"/>
  <!-- Amber border -->
  <rect x="1" y="1" width="98" height="98" rx="23" fill="none" stroke="url(#stroke)" stroke-width="1.2" opacity="0.7"/>
  <!-- C letterform -->
  <text
    x="52"
    y="70"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="60"
    font-weight="300"
    letter-spacing="-2"
    fill="#C9A84C"
  >C</text>
  <!-- Small amber dot accent bottom-right -->
  <circle cx="72" cy="72" r="3.5" fill="#C9A84C" opacity="0.5"/>
</svg>
